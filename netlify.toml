# HTML: revalidate on every load but allow conditional requests
# (lets browser show cached page instantly while checking for updates)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# JS files use ?v=YYYYMMDD query strings as cache busters in index.html,
# so each new deploy gets a fresh URL. Cache them long.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Icons rarely change — cache for a year.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker: always revalidate so updates roll out.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Manifest: short cache.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
