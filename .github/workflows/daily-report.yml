name: Daily Report

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 6 AM EST (winter) / 7 AM EDT (summer). GitHub crons run in UTC and don't honor DST.
  workflow_dispatch:        # allow manual run

permissions:
  contents: write           # needed so the job can push data/eos-snapshot.json back

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r reports/requirements.txt

      - name: Run daily report
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python reports/generate_report.py --type daily

      - name: Commit EOS snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eos-snapshot.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore(eos): daily snapshot $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi
